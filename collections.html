<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse premium scrapbook paper collections, washi tape catalogs, stickers, embellishments, and seasonal kit bundles." />
  <title>Collections | Paperie & Petal</title>
  <script>
    (function () {
      const theme = localStorage.getItem("paperie-theme");
      const rtl = localStorage.getItem("paperie-rtl") === "true";
      if (theme === "dark") document.documentElement.classList.add("dark");
      if (rtl) document.documentElement.setAttribute("dir", "rtl");
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { display: ["Playfair Display", "serif"], sans: ["Poppins", "sans-serif"] }, colors: { rose: "#D9778B", sage: "#7A9E7E" } } } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="collections">
  <div id="site-header"></div>
  <main id="app"></main>
  <div id="site-footer"></div>
  <div id="lightbox" class="lightbox" aria-hidden="true"><button class="lightbox-close" type="button" aria-label="Close gallery preview">&times;</button><img src="" alt="Expanded craft gallery preview" /></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/site.js"></script>
</body>
</html>
